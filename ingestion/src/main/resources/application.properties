spring.application.name=religious-texts-ingestion
server.port=8091

file.encoding=UTF-8

spring.datasource.url=jdbc:mysql://localhost:3306/religioustext?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC
spring.datasource.username=rtuser
spring.datasource.password=${DB_PASSWORD:rtpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.jpa.properties.hibernate.connection.useUnicode=true

spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

basex.uri=http://localhost:8984/rest
basex.username=admin
basex.password=${BASEX_PASSWORD:admin}
basex.database=religioustext
basex.schema.path=/srv/basex/schema/religious-text.xsd

# API.Bible key — set in application-local.properties
apibible.api-key=${APIBIBLE_KEY:}

spring.config.import=optional:classpath:bible-sources.yml

logging.level.org.religioustext=DEBUG
logging.level.org.springframework.batch=DEBUG
