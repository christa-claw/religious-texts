spring.application.name=religious-texts-app
server.port=8090

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true
file.encoding=UTF-8

spring.datasource.url=jdbc:mysql://localhost:3306/religioustext?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC
spring.datasource.username=rtuser
spring.datasource.password=${DB_PASSWORD:rtpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.jpa.properties.hibernate.connection.useUnicode=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

religioustext.transcripts-dir=transcripts

basex.uri=http://localhost:8984/rest
basex.username=admin
basex.password=${BASEX_PASSWORD:admin}
basex.database=religioustext
basex.schema.path=/srv/basex/schema/religious-text.xsd

vaadin.launch-browser=false
vaadin.whitelisted-packages=com.vaadin,org.vaadin,dev.hilla,org.religioustext

logging.level.org.religioustext=DEBUG
logging.level.org.springframework.batch=INFO
logging.level.com.vaadin=INFO

spring.config.import=optional:classpath:application-local.properties
