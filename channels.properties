# ============================================================
# channels.properties — YouTube channels for transcript fetching
# ============================================================
# Format:
#   key = https://www.youtube.com/@Handle
#   key.types = videos,streams,shorts   (optional, default: videos,streams)
#
# Run:
#   python3 fetch_transcripts.py              # all channels
#   python3 fetch_transcripts.py --channel godlogic
#   python3 fetch_transcripts.py --dry-run    # preview only
# ============================================================

[channels]

# ── Islamic ──────────────────────────────────────────────────
zakir_naik        = https://www.youtube.com/@Drzakirchannel
zakir_naik.types  = videos

ali_dawah         = https://www.youtube.com/@AliDawah
ali_dawah.types   = videos,streams

dus_dawah         = https://www.youtube.com/@DUSDawah
dus_dawah.types   = videos,streams

hijab             = https://www.youtube.com/@MohammedHijab
hijab.types       = videos,streams

quran_speaks      = https://www.youtube.com/@QuranSpeaks
quran_speaks.types = streams

dawah_bros        = https://www.youtube.com/@dawahbrospodcast
dawah_bros.types  = videos

# ── Christian ─────────────────────────────────────────────────
shamounian        = https://www.youtube.com/@ShamounianExplains
shamounian.types  = videos

apologetics_rs    = https://www.youtube.com/@apologeticsroadshow
apologetics_rs.types = videos

godlogic          = https://www.youtube.com/@GodLogicApologetics
godlogic.types    = videos,streams

hatun_tash        = https://www.youtube.com/@HatunTashDCCIMinistries
hatun_tash.types  = videos

# ── Critical ──────────────────────────────────────────────────
jihadwatch        = https://www.youtube.com/@JihadWatchVideo
jihadwatch.types  = videos

raymond_ibrahim   = https://www.youtube.com/@RaymondIbrahim-HW
raymond_ibrahim.types = videos
